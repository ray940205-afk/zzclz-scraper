name: 漳州菜篮子 - 每日价格抓取

on:
  schedule:
    # 每天北京时间 10:30 (UTC 2:30)
    - cron: '30 2 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install openpyxl

      - name: 抓取价格数据
        run: python scrape.py

      - name: 提交更新
        run: |
          git config user.name "Price Bot"
          git config user.email "bot@zzclz-scraper.local"
          git add 漳州菜篮子_零售价格日报表.xlsx
          git diff --staged --quiet || git commit -m "📊 $(date +%Y-%m-%d) 每日价格更新"
          git push
